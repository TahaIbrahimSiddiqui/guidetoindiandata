# Biweekly catalog maintenance: audit + optional AI assist + PR.
# Deploy still runs from deploy.yml on push to main (after you merge the PR).
name: Biweekly catalog refresh

on:
  schedule:
    # GitHub cron cannot express a true every-two-weeks cadence directly.
    # Wake weekly at 06:00 UTC on Monday; the cadence step skips off weeks.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      apply_ai_summaries:
        description: "Write AI summary proposals into datasetSummaries.ts (true/false)"
        required: false
        default: "false"
      max_ai_items:
        description: "Max datasets for AI rewrite"
        required: false
        default: "12"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: biweekly-catalog-refresh
  cancel-in-progress: false

env:
  BIWEEKLY_ANCHOR_DATE: "2026-07-13"

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check biweekly cadence
        id: cadence
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          anchor="${BIWEEKLY_ANCHOR_DATE}"
          today="$(date -u +%F)"
          day_of_week="$(date -u +%u)"
          week_start="$(date -u -d "$today -$((day_of_week - 1)) days" +%F)"
          anchor_day_of_week="$(date -u -d "$anchor" +%u)"
          anchor_week_start="$(date -u -d "$anchor -$((anchor_day_of_week - 1)) days" +%F)"
          elapsed_days=$(( ( $(date -u -d "$week_start" +%s) - $(date -u -d "$anchor_week_start" +%s) ) / 86400 ))

          if [ $((elapsed_days % 14)) -eq 0 ]; then
            echo "run_refresh=true" >> "$GITHUB_OUTPUT"
            echo "Running biweekly refresh for week starting $week_start."
          else
            echo "run_refresh=false" >> "$GITHUB_OUTPUT"
            echo "Skipping off-week refresh for week starting $week_start."
          fi

      - name: Checkout
        if: steps.cadence.outputs.run_refresh == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.cadence.outputs.run_refresh == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        if: steps.cadence.outputs.run_refresh == 'true'
        run: npm ci

      - name: Run biweekly refresh (audit + Dartmouth Chat AI)
        if: steps.cadence.outputs.run_refresh == 'true'
        env:
          SCRATCH: ${{ github.workspace }}/content/automation/.scratch
          # Dartmouth Chat API key (https://rc.dartmouth.edu/ai/online-resources/using-the-api/)
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: dartmouth
          # Optional override; if empty, auto-picks latest pro-class model from /models
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://chat.dartmouth.edu/api' }}
          AI_MAX_ITEMS: ${{ github.event.inputs.max_ai_items || '12' }}
          AI_BATCH_SIZE: "4"
          AI_APPLY: ${{ github.event.inputs.apply_ai_summaries || 'false' }}
          # Non-strict: AI failures write a report but do not fail the job
          AI_STRICT: "0"
        run: npx tsx scripts/bimonthly-catalog-refresh.mjs

      - name: Upload automation artifacts
        if: always() && steps.cadence.outputs.run_refresh == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: biweekly-automation-${{ github.run_id }}
          path: |
            content/automation/**
          if-no-files-found: warn

      # Requires: Settings → Actions → General → Workflow permissions
      #   - Read and write permissions
      #   - Allow GitHub Actions to create and approve pull requests
      - name: Create pull request if there are changes
        id: cpr
        if: steps.cadence.outputs.run_refresh == 'true'
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: biweekly catalog refresh"
          title: "chore: biweekly catalog refresh (${{ github.run_id }})"
          body: |
            Automated biweekly catalog maintenance.

            - Full content/link audit via `scripts/page-content-audit.mjs`
            - AI assist via **Dartmouth Chat API** (`https://chat.dartmouth.edu/api`) when `AI_API_KEY` is set
            - Auto-selects a pro-class model from `GET /models` unless `AI_MODEL` var is set
            - Report under `content/automation/`

            ### Review
            1. Open `content/automation/LATEST.md` and `ai-assist-*.md`
            2. If AI applied summaries, skim `src/data/datasetSummaries.ts` diffs
            3. Merge to deploy via the existing Pages deploy workflow

            ### Secrets / docs
            | Secret | Purpose |
            |--------|---------|
            | `AI_API_KEY` | Dartmouth Chat API key (Profile → Settings → Account → API Key) |
            | `AI_BASE_URL` | Optional; default `https://chat.dartmouth.edu/api` |

            Docs: https://rc.dartmouth.edu/ai/online-resources/using-the-api/

            Manual run: Actions → **Biweekly catalog refresh** → Run workflow.
            List models: Actions → **List AI models**.
          branch: chore/biweekly-refresh-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            content/automation/**
            src/data/datasetSummaries.ts

      - name: PR creation status
        if: always() && steps.cadence.outputs.run_refresh == 'true'
        run: |
          echo "pull-request-number=${{ steps.cpr.outputs.pull-request-number }}"
          echo "pull-request-url=${{ steps.cpr.outputs.pull-request-url }}"
          if [ "${{ steps.cpr.outcome }}" != "success" ]; then
            echo "::warning::Could not open PR (enable 'Allow GitHub Actions to create and approve pull requests' under Settings → Actions → General). Artifacts still uploaded."
          fi
