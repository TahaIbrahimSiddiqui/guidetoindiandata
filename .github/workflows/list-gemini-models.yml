# On-demand: list models available to the repo AI_API_KEY
# Default: Dartmouth Chat API (https://chat.dartmouth.edu/api/models)
name: List AI models

on:
  workflow_dispatch:
    inputs:
      provider:
        description: "dartmouth | google | openai"
        required: false
        default: "dartmouth"

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: List models
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: ${{ github.event.inputs.provider || 'dartmouth' }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: npx tsx scripts/list-ai-models.mjs

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-models-${{ github.run_id }}
          path: content/automation/ai-models-available.json
          if-no-files-found: warn
