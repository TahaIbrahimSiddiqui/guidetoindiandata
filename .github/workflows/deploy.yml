name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build static site
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /guidetoindiandata
          NEXT_PUBLIC_ADS_ENABLED: ${{ vars.NEXT_PUBLIC_ADS_ENABLED || secrets.NEXT_PUBLIC_ADS_ENABLED || 'false' }}
          NEXT_PUBLIC_ADSENSE_CLIENT: ${{ vars.NEXT_PUBLIC_ADSENSE_CLIENT || secrets.NEXT_PUBLIC_ADSENSE_CLIENT }}
          NEXT_PUBLIC_ADS_SLOT_TOP: ${{ vars.NEXT_PUBLIC_ADS_SLOT_TOP || secrets.NEXT_PUBLIC_ADS_SLOT_TOP }}
          NEXT_PUBLIC_ADS_SLOT_SIDEBAR: ${{ vars.NEXT_PUBLIC_ADS_SLOT_SIDEBAR || secrets.NEXT_PUBLIC_ADS_SLOT_SIDEBAR }}
          NEXT_PUBLIC_ADS_SLOT_IN_CONTENT: ${{ vars.NEXT_PUBLIC_ADS_SLOT_IN_CONTENT || secrets.NEXT_PUBLIC_ADS_SLOT_IN_CONTENT }}
          NEXT_PUBLIC_ADS_SLOT_BOTTOM: ${{ vars.NEXT_PUBLIC_ADS_SLOT_BOTTOM || secrets.NEXT_PUBLIC_ADS_SLOT_BOTTOM }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
