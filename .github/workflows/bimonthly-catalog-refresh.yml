# Bi-monthly catalog maintenance: audit + optional AI assist + PR.
# Deploy still runs from deploy.yml on push to main (after you merge the PR).
name: Bi-monthly catalog refresh

on:
  schedule:
    # 06:00 UTC on the 1st of every other month (Jan, Mar, May, Jul, Sep, Nov)
    - cron: "0 6 1 1,3,5,7,9,11 *"
  workflow_dispatch:
    inputs:
      apply_ai_summaries:
        description: "Write AI summary proposals into datasetSummaries.ts (true/false)"
        required: false
        default: "false"
      max_ai_items:
        description: "Max datasets for AI rewrite"
        required: false
        default: "12"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bimonthly-catalog-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Run bi-monthly refresh (audit + Gemini Pro + Google Search)
        env:
          SCRATCH: ${{ github.workspace }}/content/automation/.scratch
          # Prefer dedicated Gemini secret; fall back to AI_API_KEY
          AI_API_KEY: ${{ secrets.GEMINI_API_KEY || secrets.GOOGLE_API_KEY || secrets.AI_API_KEY }}
          AI_PROVIDER: google
          # Latest stable Pro model with Google Search grounding
          AI_MODEL: ${{ vars.AI_MODEL || 'gemini-2.5-pro' }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          AI_GOOGLE_SEARCH: "true"
          AI_MAX_ITEMS: ${{ github.event.inputs.max_ai_items || '12' }}
          AI_BATCH_SIZE: "4"
          AI_APPLY: ${{ github.event.inputs.apply_ai_summaries || 'false' }}
          # Non-strict: AI failures write a report but do not fail the job
          AI_STRICT: "0"
        run: npx tsx scripts/bimonthly-catalog-refresh.mjs

      - name: Upload automation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bimonthly-automation-${{ github.run_id }}
          path: |
            content/automation/**
          if-no-files-found: warn

      - name: Create pull request if there are changes
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bi-monthly catalog refresh"
          title: "chore: bi-monthly catalog refresh (${{ github.run_id }})"
          body: |
            Automated bi-monthly catalog maintenance.

            - Full content/link audit via `scripts/page-content-audit.mjs`
            - AI assist: **Gemini Pro + Google Search grounding** when a Gemini/Google key is set
            - Report under `content/automation/`

            ### Review
            1. Open `content/automation/LATEST.md` and `ai-assist-*.md`
            2. If AI applied summaries, skim `src/data/datasetSummaries.ts` diffs
            3. Merge to deploy via the existing Pages deploy workflow

            ### Secrets (repo Settings → Secrets and variables → Actions)
            | Secret | Required | Purpose |
            |--------|----------|---------|
            | `GEMINI_API_KEY` or `GOOGLE_API_KEY` or `AI_API_KEY` | for AI | Google AI Studio / Gemini API key |
            | `AI_MODEL` | no | Default **`gemini-2.5-pro`** (override e.g. `gemini-2.5-flash`) |
            | `AI_PROVIDER` | no | Default `google` (`openai` for OpenAI-compatible) |
            | `AI_BASE_URL` | no | Only for OpenAI-compatible providers |

            Manual run: Actions → **Bi-monthly catalog refresh** → Run workflow.
          branch: chore/bimonthly-refresh-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            content/automation/**
            src/data/datasetSummaries.ts
