# Twice-monthly catalog discovery: dedupe + optional AI assist + PR.
# Deploy still runs from deploy.yml on push to main (after you merge the PR).
name: Catalog discovery refresh

on:
  schedule:
    # Twice monthly at 06:00 UTC on the 1st and 15th.
    - cron: "0 6 1,15 * *"
  workflow_dispatch:
    inputs:
      apply_new_datasets:
        description: "Append high-confidence new dataset records (true/false)"
        required: false
        default: "true"
      max_new_datasets:
        description: "Max new datasets to add per run"
        required: false
        default: "2"
      apply_ai_summaries:
        description: "Write AI summary proposals into datasetSummaries.ts (true/false)"
        required: false
        default: "false"
      max_ai_items:
        description: "Max datasets for AI rewrite"
        required: false
        default: "12"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: catalog-discovery-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Run catalog discovery refresh (Dartmouth AI + audit)
        env:
          SCRATCH: ${{ github.workspace }}/content/automation/.scratch
          # Dartmouth Chat API key (https://rc.dartmouth.edu/ai/online-resources/using-the-api/)
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_PROVIDER: dartmouth
          # Optional override; if empty, auto-picks latest pro-class model from /models
          AI_MODEL: ${{ vars.AI_MODEL }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL || 'https://chat.dartmouth.edu/api' }}
          AI_MAX_ITEMS: ${{ github.event.inputs.max_ai_items || '12' }}
          AI_BATCH_SIZE: "4"
          AI_APPLY: ${{ github.event.inputs.apply_ai_summaries || 'false' }}
          DISCOVERY_APPLY: ${{ github.event.inputs.apply_new_datasets || 'true' }}
          DISCOVERY_MAX_ADDITIONS: ${{ github.event.inputs.max_new_datasets || '2' }}
          DISCOVERY_MIN_CONFIDENCE: "0.86"
          # Non-strict: AI failures write a report but do not fail the job
          AI_STRICT: "0"
          DISCOVERY_STRICT: "0"
        run: npx tsx scripts/bimonthly-catalog-refresh.mjs

      - name: Upload automation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: catalog-discovery-${{ github.run_id }}
          path: |
            content/automation/**
          if-no-files-found: warn

      # Requires: Settings → Actions → General → Workflow permissions
      #   - Read and write permissions
      #   - Allow GitHub Actions to create and approve pull requests
      - name: Create pull request if there are changes
        id: cpr
        continue-on-error: true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: catalog discovery refresh"
          title: "chore: catalog discovery refresh (${{ github.run_id }})"
          body: |
            Automated twice-monthly catalog discovery.

            - New dataset discovery via **Dartmouth Chat API** (`https://chat.dartmouth.edu/api`) when `AI_API_KEY` is set
            - Duplicate filtering before any catalog write
            - Full content/link audit via `scripts/page-content-audit.mjs`
            - Optional existing-copy assist for thin summaries
            - Reports stay in the workflow artifact so empty runs do not create PR clutter

            ### Review
            1. Review additions in `src/data/discoveredDatasets.ts`
            2. Download this run's `catalog-discovery-*` artifact to inspect `discovery-latest.md`
            3. Merge to deploy via the existing Pages deploy workflow

            ### Secrets / docs
            | Secret | Purpose |
            |--------|---------|
            | `AI_API_KEY` | Dartmouth Chat API key (Profile → Settings → Account → API Key) |
            | `AI_BASE_URL` | Optional; default `https://chat.dartmouth.edu/api` |

            Docs: https://rc.dartmouth.edu/ai/online-resources/using-the-api/

            Manual run: Actions → **Catalog discovery refresh** → Run workflow.
            List models: Actions → **List AI models**.
          branch: chore/catalog-discovery-${{ github.run_id }}
          delete-branch: true
          add-paths: |
            src/data/discoveredDatasets.ts
            src/data/datasetSummaries.ts

      - name: PR creation status
        if: always()
        run: |
          echo "pull-request-number=${{ steps.cpr.outputs.pull-request-number }}"
          echo "pull-request-url=${{ steps.cpr.outputs.pull-request-url }}"
          if [ "${{ steps.cpr.outcome }}" != "success" ]; then
            echo "::warning::Could not open PR (enable 'Allow GitHub Actions to create and approve pull requests' under Settings → Actions → General). Artifacts still uploaded."
          fi
